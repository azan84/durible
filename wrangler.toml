# Wrangler config for Durible3D — Cloudflare Pages + D1 + R2
# Used by the `wrangler pages dev` local dev server and for binding reference.
# For production, bindings must also be set in the Cloudflare Pages dashboard
# (Pages project > Settings > Functions > Bindings).

name = "durible"
pages_build_output_dir = "."
compatibility_date = "2024-11-01"

# D1 database binding — accessed in the Pages Function as `env.DB`
[[d1_databases]]
binding = "DB"
database_name = "durible-orders"
# After you run `wrangler d1 create durible-orders`, paste the returned
# database_id here:
database_id = "f015ed66-4987-4b77-a8fe-f0e73eedbc66"

# R2 bucket binding — accessed in the Pages Function as `env.BUCKET`
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "durible-uploads"
